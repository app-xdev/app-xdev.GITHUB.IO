<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login — App-xdev Dapur Ngebul</title>
  <link rel="icon" href="favicon.ico" />
  <meta name="robots" content="noindex, nofollow" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8033409291325553" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#0d0d0d;color:#f2f2f2;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .brand{text-align:center;margin-bottom:32px}
    .brand-emoji{font-size:2.5rem;display:block;margin-bottom:8px}
    .brand-name{font-size:1.5rem;font-weight:900;background:linear-gradient(90deg,#ff6a00,#ee0979,#a855f7,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .brand-sub{font-size:.8rem;color:#888;margin-top:4px}
    .card{background:#1a1a1a;border:1px solid #2d2d2d;border-radius:16px;padding:32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .card h1{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:6px}
    .subtitle{text-align:center;color:#888;font-size:.875rem;margin-bottom:28px}
    /* Google Button */
    .btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:13px 20px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:8px;font-size:.95rem;font-weight:500;cursor:pointer;transition:box-shadow .2s;text-decoration:none;margin-bottom:20px}
    .btn-google:hover{box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .google-icon{width:20px;height:20px;flex-shrink:0}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;color:#555;font-size:.8rem}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#2d2d2d}
    /* Form */
    .form-group{margin-bottom:16px}
    label{display:block;font-size:.8rem;color:#aaa;margin-bottom:6px;font-weight:500}
    input{width:100%;padding:12px 14px;background:#111;border:1px solid #333;border-radius:8px;color:#f2f2f2;font-size:.95rem;outline:none;transition:border-color .2s}
    input:focus{border-color:#ee0979}
    .btn-login{width:100%;padding:13px;background:linear-gradient(135deg,#ff6a00,#ee0979);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .2s}
    .btn-login:hover{opacity:.9;transform:scale(1.02)}
    .msg{margin-top:16px;padding:12px;border-radius:8px;text-align:center;font-size:.875rem;display:none}
    .msg.error{background:#3b0000;border:1px solid #7f1d1d;color:#fca5a5;display:block}
    .msg.success{background:#052e16;border:1px solid #166534;color:#86efac;display:block}
    .back-link{text-align:center;margin-top:20px;font-size:.8rem;color:#666}
    .back-link a{color:#ee0979;text-decoration:none}
    .back-link a:hover{text-decoration:underline}
  </style>
</head>
<body>

  <div class="brand">
    <span class="brand-emoji">🏎️💨🔥</span>
    <div class="brand-name">Dapur Ngebul</div>
    <div class="brand-sub">App-xdev — Member Area</div>
  </div>

  <div class="card">
    <h1>🔐 Member Login</h1>
    <p class="subtitle">Masuk untuk akses area download eksklusif</p>

    <!-- Google Sign-In (UI demo) -->
    <a href="#" class="btn-google" onclick="alert('Google Sign-In belum aktif. Gunakan login manual di bawah.');return false;">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Masuk dengan Google
    </a>

    <div class="divider">atau masuk dengan username</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" required />
      </div>
      <div id="msg" class="msg"></div>
      <button type="submit" class="btn-login">Masuk Sekarang</button>
    </form>

    <div class="back-link">
      <a href="/">← Kembali ke Beranda</a>
    </div>
  </div>

  <script>
    const USERS = { 'member': 'login', 'admin': 'dapur2025' };

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const msg = document.getElementById('msg');
      msg.className = 'msg';

      if (USERS[u] && USERS[u] === p) {
        msg.className = 'msg success';
        msg.textContent = '✅ Login berhasil! Mengalihkan...';
        sessionStorage.setItem('member_logged_in', '1');
        setTimeout(() => { window.location.href = 'downloads.html'; }, 1000);
      } else {
        msg.className = 'msg error';
        msg.textContent = '❌ Username atau password salah.';
      }
    });
  </script>

</body>
</html>
