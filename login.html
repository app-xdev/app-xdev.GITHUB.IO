 </a> <div class="divider">atau masuk dengan akun member</div> <form id="loginForm"> <div class="form-group"> <label>USERNAME</label> <input type="text" id="uname" placeholder="Masukkan username" autocomplete="username" required /> </div> <div class="form-group"> <label>PASSWORD</label> <input type="password" id="upass" placeholder="Masukkan password" autocomplete="current-password" required /> </div> <div id="alertBox" class="alert"></div> <button type="submit" class="btn-masuk">Masuk Sekarang →</button> </form> <div class="back"><a href="/">← Kembali ke Beranda</a></div> </div> <script> document.getElementById('loginForm').addEventListener('submit', function(e) {
