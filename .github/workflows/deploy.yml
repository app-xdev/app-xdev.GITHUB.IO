name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp index.html _site/
          cp login.html _site/
          cp downloads.html _site/
          cp copyright.html _site/
          cp disclaimer.html _site/
          cp privacy-policy.html _site/
          cp tentang.html _site/
          cp kontak.html _site/
          cp feed.xml _site/
          cp post-sitemap.xml _site/
          cp ads.txt _site/
          cp -r articles _site/articles
          cp -r kategori _site/kategori
          cp -r public/. _site/
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
